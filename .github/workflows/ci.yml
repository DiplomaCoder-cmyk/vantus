name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target_ci

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}
          cache-targets: true

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --lib --tests

      - name: Doc tests
        run: cargo test --doc

      - name: Examples
        run: cargo test --examples --no-run

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Docs
        run: cargo doc --no-deps

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install docs dependencies
        run: npm install  
      - name: Build docs
        run: npm run docs:build 

  msrv:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target_msrv

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Check MSRV build
        run: cargo check --all-targets --all-features

  release:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target_release

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          cache-targets: true

      - name: Package list
        run: cargo package --allow-dirty --list > package-list.txt

      - name: Verify package list is release-safe
        shell: bash
        run: |
          # Only check for files if they actually exist in the package list
          for pattern in "target_doc_plan" "target_examples" "examples/demo_app" "examples/html" "src/di_container.rs" "tests/macros.rs" "tests/module.rs"; do
            if grep -q "$pattern" package-list.txt; then
              echo "Error: $pattern found in package list"
              exit 1
            fi
          done

      - name: Publish dry run macros
        run: cargo publish -p vantus_macros --dry-run --allow-dirty

      - name: Publish dry run framework
        run: cargo publish -p vantus --dry-run --allow-dirty

  security:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target_audit

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install audit tools
        run: cargo install cargo-audit cargo-deny --locked

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check
